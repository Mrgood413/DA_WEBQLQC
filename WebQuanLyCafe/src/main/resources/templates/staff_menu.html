<body class="bg-background font-body text-on-surface flex min-h-screen">
<aside class="hidden md:flex flex-col h-full py-8 bg-[#f5eed7] dark:bg-[#271310] h-screen w-64 fixed left-0 top-0 z-50 shadow-xl dark:shadow-none font-inter text-sm font-medium transition-all duration-300 ease-in-out">
<div class="px-6 mb-10">
<div class="flex items-center gap-3 mb-2">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined">coffee</span>
</div>
<div>
<h1 class="font-manrope font-bold text-lg text-[#271310] dark:text-[#f5eed7]">Artisanal Ledger</h1>
<p class="text-[10px] uppercase tracking-widest opacity-60">Staff Portal</p>
</div>
</div>

<nav class="flex-1 space-y-1">

<span class="material-symbols-outlined">receipt_long</span>
<span>Orders</span>
</a>
<a class="bg-[#ffffff] dark:bg-[#3e2723] text-[#271310] dark:text-[#ffffff] rounded-r-full py-3 px-6 shadow-sm flex items-center gap-4" href="/staff/menu">
<span class="material-symbols-outlined">restaurant_menu</span>
<span>Menu</span>
</a>
</nav>
<div class="mt-auto px-6 pt-6 border-t border-outline-variant/20">
<button type="button" id="btn-logout" class="text-error py-2 flex items-center gap-4 hover:opacity-70 transition-opacity w-full text-left">
<span class="material-symbols-outlined">logout</span>
<span>Logout</span>
</button>
</div>
</aside>
<main class="flex-1 md:ml-64 min-h-screen flex flex-col">
<header class="bg-[#fff9ea] dark:bg-[#1e1c0e] docked full-width top-0 z-40 flex justify-between items-center w-full px-6 py-3 sticky">
<div class="flex items-center gap-6">
<span class="md:hidden material-symbols-outlined text-primary cursor-pointer">menu</span>
<div class="flex items-center gap-2">
<h2 class="text-xl font-bold text-[#271310] dark:text-[#f5eed7] tracking-tight font-manrope">Quản lý Thực đơn</h2>
</div>
</div>
<div class="flex items-center gap-4">
</div>
</header>
<div class="p-6 md:p-8 space-y-8 max-w-7xl mx-auto w-full flex-1">
<p id="page-error" class="hidden text-sm text-error px-1" role="alert"></p>
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<div id="category-tabs" class="flex items-center gap-2 overflow-x-auto pb-2 md:pb-0 no-scrollbar flex-wrap"></div>
<button type="button" id="btn-add-product" class="bg-primary text-on-primary px-6 py-3 rounded-full font-bold shadow-lg hover:shadow-xl hover:translate-y-[-2px] transition-all flex items-center justify-center gap-2 shrink-0">
<span class="material-symbols-outlined">add_circle</span>
Thêm món mới
</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 flex flex-col justify-between py-8">
<span class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider">Tổng số món</span>
<div class="mt-4 flex items-end gap-2">
<span id="stat-total" class="text-4xl font-bold font-manrope text-primary">—</span>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 flex flex-col justify-between py-8">
<span class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider">Đang hiển thị (bán)</span>
<div class="mt-4 flex items-end gap-2">
<span id="stat-visible" class="text-4xl font-bold font-manrope text-primary">—</span>
</div>
</div>
</div>
<div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
</div>

<div id="modalBackdrop" class="fixed inset-0 bg-black/40 z-[100] hidden items-center justify-center p-4">
<div class="bg-surface rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto custom-scrollbar border border-outline-variant/20">
<div class="p-6 border-b border-outline-variant/10 flex justify-between items-center sticky top-0 bg-surface z-10">
<h3 id="modal-title" class="font-manrope font-bold text-lg text-primary">Thêm món</h3>
<button type="button" id="modal-close" class="p-2 rounded-lg hover:bg-surface-container-high text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<form id="product-form" class="p-6 space-y-4">
<input type="hidden" id="f-product-id"/>
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-name">Tên món</label>
<input required id="f-name" name="name" maxlength="150" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary"/>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-description">Mô tả chi tiết</label>
<textarea id="f-description" name="description" rows="4" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary text-sm"></textarea>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-price">Giá (đ)</label>
<input required id="f-price" name="price" type="number" min="0" step="1000" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary"/>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-quantity">Số lượng tồn</label>
<input required id="f-quantity" name="quantity" type="number" min="0" step="1" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary"/>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-imageUrl">URL hình ảnh</label>
<input id="f-imageUrl" name="imageUrl" type="url" maxlength="255" placeholder="https://..." class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary text-sm"/>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="f-categoryId">Danh mục</label>
<select required id="f-categoryId" name="categoryId" class="w-full rounded-lg border border-outline-variant/30 bg-surface-container-highest px-3 py-2 text-primary"></select>
</div>
<div class="flex items-center gap-3 pt-2">
<input id="f-available" name="available" type="checkbox" class="rounded border-outline-variant w-4 h-4 text-secondary focus:ring-secondary"/>
<label for="f-available" class="text-sm font-medium text-on-surface">Hiển thị trong thực đơn (đang bán)</label>
</div>
<p id="form-error" class="text-sm text-error hidden" role="alert"></p>
<div class="flex gap-3 pt-4">
<button type="submit" class="flex-1 bg-primary text-on-primary font-bold py-3 rounded-full shadow-lg">Lưu</button>
<button type="button" id="form-cancel" class="px-6 py-3 rounded-full border border-outline-variant text-on-surface-variant font-medium">Hủy</button>
</div>
</form>
</div>
</div>

<script>
(function () {
  var API = {
    products: '/api/staff/products',
    categories: '/api/staff/categories',
    logout: '/api/auth/logout'
  };

  var state = {
    products: [],
    categories: [],
    filterCategoryId: null
  };

  var els = {
    grid: document.getElementById('product-grid'),
    tabs: document.getElementById('category-tabs'),
    statTotal: document.getElementById('stat-total'),
    statVisible: document.getElementById('stat-visible'),
    pageError: document.getElementById('page-error'),
    modalBackdrop: document.getElementById('modalBackdrop'),
    modalTitle: document.getElementById('modal-title'),
    form: document.getElementById('product-form'),
    formError: document.getElementById('form-error')
  };

  function fmtMoney(n) {
    if (n == null || n === '') return '0';
    var num = typeof n === 'number' ? n : parseFloat(String(n), 10);
    if (isNaN(num)) return String(n);
    return num.toLocaleString('vi-VN') + 'đ';
  }

  async function apiJson(url, opts) {
    var res = await fetch(url, Object.assign({ credentials: 'same-origin' }, opts || {}));
    var text = await res.text();
    var data = null;
    try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }
    if (!res.ok) {
      var msg = (data && data.message) ? data.message : ('HTTP ' + res.status);
      var err = new Error(msg);
      err.status = res.status;
      throw err;
    }
    return data;
  }

  function renderTabs() {
    var frag = document.createDocumentFragment();
    function addTab(label, catId, active) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = label;
      btn.className = 'px-6 py-2 rounded-full font-medium text-sm whitespace-nowrap transition-colors ' +
        (active ? 'bg-secondary-container text-on-secondary-container shadow-sm' : 'bg-surface-container-high hover:bg-surface-container-highest text-on-surface');
      btn.addEventListener('click', function () {
        state.filterCategoryId = catId;
        renderTabs();
        renderGrid();
      });
      frag.appendChild(btn);
    }
    addTab('Tất cả', null, state.filterCategoryId === null);
    state.categories.forEach(function (c) {
      addTab(c.name, c.id, state.filterCategoryId === c.id);
    });
    els.tabs.innerHTML = '';
    els.tabs.appendChild(frag);
  }

  function filteredProducts() {
    if (state.filterCategoryId == null) return state.products;
    return state.products.filter(function (p) { return p.categoryId === state.filterCategoryId; });
  }

  function updateStats() {
    var total = state.products.length;
    var visible = state.products.filter(function (p) { return p.available; }).length;
    els.statTotal.textContent = String(total);
    els.statVisible.textContent = String(visible);
  }

  function renderGrid() {
    var list = filteredProducts();
    els.grid.innerHTML = '';
    if (!list.length) {
      var empty = document.createElement('p');
      empty.className = 'text-on-surface-variant text-sm col-span-full text-center py-12';
      empty.textContent = 'Chưa có món nào trong nhóm này.';
      els.grid.appendChild(empty);
      return;
    }
    list.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'group bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-col border border-outline-variant/5';
      var imgWrap = document.createElement('div');
      imgWrap.className = 'relative h-48 overflow-hidden bg-surface-container-high';
      if (p.imageUrl) {
        var img = document.createElement('img');
        img.className = 'w-full h-full object-cover';
        img.alt = '';
        img.src = p.imageUrl;
        imgWrap.appendChild(img);
      } else {
        var ph = document.createElement('div');
        ph.className = 'w-full h-full flex items-center justify-center text-on-surface-variant/40';
        ph.innerHTML = '<span class="material-symbols-outlined text-5xl">image</span>';
        imgWrap.appendChild(ph);
      }
      var badge = document.createElement('span');
      badge.className = 'absolute top-3 right-3 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ' +
        (p.available ? 'bg-secondary text-on-secondary' : 'bg-primary-container text-primary-fixed');
      badge.textContent = p.available ? 'Đang bán' : 'Ẩn';
      imgWrap.appendChild(badge);
      card.appendChild(imgWrap);

      var body = document.createElement('div');
      body.className = 'p-5 flex-1 flex flex-col';
      var titleRow = document.createElement('div');
      titleRow.className = 'flex justify-between items-start mb-2 gap-2';
      var h3 = document.createElement('h3');
      h3.className = 'font-manrope font-bold text-primary text-lg';
      h3.textContent = p.name || '';
      var price = document.createElement('span');
      price.className = 'font-bold text-primary shrink-0';
      price.textContent = fmtMoney(p.price);
      titleRow.appendChild(h3);
      titleRow.appendChild(price);
      body.appendChild(titleRow);
      var cat = document.createElement('p');
      cat.className = 'text-xs text-on-surface-variant mb-1';
      cat.textContent = p.categoryName || '—';
      body.appendChild(cat);
      var desc = document.createElement('p');
      desc.className = 'text-on-surface-variant text-sm line-clamp-3 flex-1 mb-4';
      desc.textContent = p.description || '(Chưa có mô tả)';
      body.appendChild(desc);

      var row = document.createElement('div');
      row.className = 'flex items-center justify-between pt-4 border-t border-outline-variant/10 gap-2 flex-wrap';
      var editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'p-2 rounded-full hover:bg-surface-container-high text-on-surface-variant';
      editBtn.title = 'Chỉnh sửa';
      editBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">edit</span>';
      editBtn.addEventListener('click', function () { openEditModal(p); });

      var qtyWrap = document.createElement('div');
      qtyWrap.className = 'flex items-center gap-2';
      var minus = document.createElement('button');
      minus.type = 'button';
      minus.className = 'w-8 h-8 rounded-full bg-surface-container-high text-primary font-bold';
      minus.textContent = '−';
      var qtyInput = document.createElement('input');
      qtyInput.type = 'number';
      qtyInput.min = '0';
      qtyInput.className = 'w-16 text-center rounded border border-outline-variant/30 px-1 py-1 text-sm';
      qtyInput.value = String(p.quantity != null ? p.quantity : 0);
      var plus = document.createElement('button');
      plus.type = 'button';
      plus.className = 'w-8 h-8 rounded-full bg-surface-container-high text-primary font-bold';
      plus.textContent = '+';

      function patchQty(next) {
        if (next < 0) next = 0;
        apiJson(API.products + '/' + p.id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity: next })
        }).then(function (updated) {
          var idx = state.products.findIndex(function (x) { return x.id === p.id; });
          if (idx >= 0) state.products[idx] = updated;
          renderGrid();
          updateStats();
        }).catch(function (e) { alert(e.message || 'Lỗi cập nhật'); });
      }
      minus.addEventListener('click', function () {
        var v = parseInt(qtyInput.value, 10) || 0;
        patchQty(v - 1);
      });
      plus.addEventListener('click', function () {
        var v = parseInt(qtyInput.value, 10) || 0;
        patchQty(v + 1);
      });
      qtyInput.addEventListener('change', function () {
        var v = parseInt(qtyInput.value, 10);
        if (isNaN(v) || v < 0) v = 0;
        patchQty(v);
      });

      qtyWrap.appendChild(minus);
      qtyWrap.appendChild(qtyInput);
      qtyWrap.appendChild(plus);

      var toggleWrap = document.createElement('div');
      toggleWrap.className = 'flex items-center gap-2 shrink-0';
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'rounded border-outline-variant w-4 h-4 text-secondary';
      chk.checked = !!p.available;
      chk.title = 'Hiển thị trong thực đơn';
      chk.addEventListener('change', function () {
        apiJson(API.products + '/' + p.id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ available: chk.checked })
        }).then(function (updated) {
          var idx = state.products.findIndex(function (x) { return x.id === p.id; });
          if (idx >= 0) state.products[idx] = updated;
          renderGrid();
          updateStats();
        }).catch(function (e) {
          chk.checked = !chk.checked;
          alert(e.message || 'Lỗi');
        });
      });
      var sp = document.createElement('span');
      sp.className = 'text-xs font-medium text-on-surface-variant whitespace-nowrap';
      sp.textContent = 'Hiện';
      toggleWrap.appendChild(chk);
      toggleWrap.appendChild(sp);

      row.appendChild(editBtn);
      row.appendChild(qtyWrap);
      row.appendChild(toggleWrap);
      body.appendChild(row);
      card.appendChild(body);
      els.grid.appendChild(card);
    });
  }

  function fillCategorySelect() {
    var sel = document.getElementById('f-categoryId');
    sel.innerHTML = '';
    state.categories.forEach(function (c) {
      var o = document.createElement('option');
      o.value = String(c.id);
      o.textContent = c.name;
      sel.appendChild(o);
    });
  }

  function openModal() {
    els.modalBackdrop.classList.remove('hidden');
    els.modalBackdrop.classList.add('flex');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    els.modalBackdrop.classList.add('hidden');
    els.modalBackdrop.classList.remove('flex');
    document.body.style.overflow = '';
    els.formError.classList.add('hidden');
    els.formError.textContent = '';
  }

  function openAddModal() {
    els.modalTitle.textContent = 'Thêm món mới';
    document.getElementById('f-product-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-quantity').value = '0';
    document.getElementById('f-imageUrl').value = '';
    document.getElementById('f-available').checked = true;
    fillCategorySelect();
    if (state.categories.length) {
      document.getElementById('f-categoryId').value = String(state.filterCategoryId != null ? state.filterCategoryId : state.categories[0].id);
    }
    openModal();
  }

  function openEditModal(p) {
    els.modalTitle.textContent = 'Chỉnh sửa món';
    document.getElementById('f-product-id').value = String(p.id);
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-description').value = p.description || '';
    document.getElementById('f-price').value = p.price != null ? String(p.price) : '';
    document.getElementById('f-quantity').value = p.quantity != null ? String(p.quantity) : '0';
    document.getElementById('f-imageUrl').value = p.imageUrl || '';
    document.getElementById('f-available').checked = !!p.available;
    fillCategorySelect();
    if (p.categoryId != null) {
      document.getElementById('f-categoryId').value = String(p.categoryId);
    }
    openModal();
  }

  document.getElementById('btn-add-product').addEventListener('click', openAddModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('form-cancel').addEventListener('click', closeModal);
  els.modalBackdrop.addEventListener('click', function (e) {
    if (e.target === els.modalBackdrop) closeModal();
  });

  els.form.addEventListener('submit', function (e) {
    e.preventDefault();
    els.formError.classList.add('hidden');
    var id = document.getElementById('f-product-id').value;
    var name = document.getElementById('f-name').value.trim();
    var description = document.getElementById('f-description').value;
    var price = parseFloat(document.getElementById('f-price').value);
    var quantity = parseInt(document.getElementById('f-quantity').value, 10);
    var imageUrl = document.getElementById('f-imageUrl').value.trim();
    var categoryId = parseInt(document.getElementById('f-categoryId').value, 10);
    var available = document.getElementById('f-available').checked;
    if (!name || isNaN(price) || price < 0 || isNaN(quantity) || quantity < 0 || isNaN(categoryId)) {
      els.formError.textContent = 'Vui lòng kiểm tra lại dữ liệu.';
      els.formError.classList.remove('hidden');
      return;
    }
    var payloadCreate = {
      name: name,
      description: description || null,
      price: price,
      imageUrl: imageUrl || null,
      quantity: quantity,
      available: available,
      categoryId: categoryId
    };
    if (id) {
      var payloadPatch = {
        name: name,
        description: description,
        price: price,
        imageUrl: imageUrl || null,
        quantity: quantity,
        available: available,
        categoryId: categoryId
      };
      apiJson(API.products + '/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payloadPatch)
      }).then(function (updated) {
        var idx = state.products.findIndex(function (x) { return x.id === updated.id; });
        if (idx >= 0) state.products[idx] = updated;
        else state.products.push(updated);
        closeModal();
        renderGrid();
        updateStats();
      }).catch(function (err) {
        els.formError.textContent = err.message || 'Lỗi lưu';
        els.formError.classList.remove('hidden');
      });
    } else {
      apiJson(API.products, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payloadCreate)
      }).then(function (created) {
        state.products.push(created);
        closeModal();
        renderGrid();
        updateStats();
      }).catch(function (err) {
        els.formError.textContent = err.message || 'Lỗi thêm món';
        els.formError.classList.remove('hidden');
      });
    }
  });

  document.getElementById('btn-logout').addEventListener('click', function () {
    fetch(API.logout, { method: 'POST', credentials: 'same-origin' }).then(function () {
      window.location.href = '/login';
    });
  });

  function boot() {
    els.pageError.classList.add('hidden');
    Promise.all([
      apiJson(API.categories),
      apiJson(API.products)
    ]).then(function (pairs) {
      state.categories = pairs[0] || [];
      state.products = pairs[1] || [];
      renderTabs();
      renderGrid();
      updateStats();
    }).catch(function (err) {
      if (err.status === 401) {
        window.location.href = '/login';
        return;
      }
      els.pageError.textContent = err.message || 'Không tải được dữ liệu.';
      els.pageError.classList.remove('hidden');
    });
  }

  boot();
})();
</script>
</body>
</html>
