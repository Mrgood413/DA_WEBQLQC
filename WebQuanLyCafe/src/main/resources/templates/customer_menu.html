<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 max-w-none bg-[#fff9ea] dark:bg-[#1e1c0e] animate-header">
<div class="flex items-center gap-8">
<span class="text-xl font-bold text-[#271310] dark:text-[#f5eed7] font-['Manrope'] tracking-tight">The Artisanal Ledger</span>
<nav class="hidden md:flex gap-6 items-center font-['Manrope'] font-semibold tracking-tight">
<a class="text-[#1b6d24] dark:text-[#a0f399] border-b-2 border-[#1b6d24] dark:border-[#a0f399] pb-1 transition-all duration-300" href="/menu">Thực đơn</a>
<a class="text-[#3e2723] dark:text-[#f5eed7] opacity-80 hover:opacity-100 hover:text-[#1b6d24] dark:hover:text-[#a0f399] border-b-2 border-transparent hover:border-[#1b6d24] dark:hover:border-[#a0f399] pb-1 transition-all duration-300 transform hover:translate-x-1 md:hover:translate-x-0" href="/order">Đơn hàng</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="relative hidden sm:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input id="menu-search-input" class="pl-10 pr-4 py-2 rounded-full bg-surface-container border-none focus:ring-2 focus:ring-secondary text-sm w-64" placeholder="Tìm kiếm món ăn..." type="text"/>
</div>
<span id="current-username" class="hidden sm:inline text-sm font-semibold text-[#271310] dark:text-[#f5eed7]">Khách</span>
<button id="logout-btn" class="px-3 py-2 rounded-full bg-surface-container text-sm font-semibold text-[#271310] hover:bg-surface-container-high transition-colors">

            </button>
</div>
<div class="absolute bottom-0 left-0 bg-[#f5eed7] dark:bg-[#271310] h-[1px] w-full"></div>
</header>
<main class="flex-grow pt-24 pb-12 px-6 max-w-7xl mx-auto w-full">
<div class="mb-12 animate-title">
<h1 class="text-5xl font-bold text-primary mb-4 tracking-tighter">Thực Đơn Bản Địa</h1>
</div>
<div class="flex flex-col md:flex-row gap-8 items-start">
<aside class="w-full md:w-64 md:sticky md:top-24 h-auto md:max-h-[calc(100vh-8rem)] overflow-y-auto no-scrollbar animate-sidebar">
<nav id="menu-category-list" class="flex flex-row md:flex-col gap-2 p-1">
<button class="flex items-center gap-3 px-4 py-3 rounded-xl bg-secondary-container text-on-secondary-container font-semibold text-sm transition-all text-left whitespace-nowrap md:whitespace-normal">
<span class="material-symbols-outlined text-lg">grid_view</span>
                    Tất cả
                </button>
</nav>
<div class="hidden md:block my-4 border-t border-outline-variant opacity-30"></div>
<div class="w-full mt-2 md:mt-0">
<button id="cart-summary-button" class="w-full flex items-center justify-between bg-secondary text-white px-4 py-4 rounded-xl shadow-lg hover:brightness-110 transition-all duration-300 group">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">shopping_cart</span>
<div class="flex flex-col items-start leading-tight">
<span id="cart-summary-count" class="font-bold text-sm">0 món</span>
<span id="cart-summary-total" class="text-xs opacity-90">0đ</span>
</div>
</div>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</aside>
<div class="flex-grow flex flex-col gap-4">
<div id="menu-loading" class="text-center py-16 text-on-surface-variant">Đang tải thực đơn...</div>
<div id="menu-error" class="hidden text-center py-16 text-error"></div>
<div id="menu-list" class="flex flex-col gap-4 min-h-[200px]"></div>
</div>
</div>
<script src="/js/customer-session.js"></script>
<script src="/js/cart-store.js"></script>
<script src="/js/menu-page.js"></script>
</main>
<footer class="w-full py-8 px-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-[#f5eed7] dark:bg-[#271310] text-[#3e2723] dark:text-[#f5eed7] font-['Inter'] text-sm font-medium animate-card delay-6">
<div class="flex gap-6 items-center">
<span class="opacity-70">© 2024 The Artisanal Ledger</span>
<div class="flex gap-4">

</div>
</div>
</footer>
